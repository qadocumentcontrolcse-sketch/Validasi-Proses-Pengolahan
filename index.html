    }

    return `
      <div class="page-head"><div><h2>Detail Produk</h2><p>Pilih Nama Produk untuk melihat seluruh data (view-only). Jika ada beberapa kode/batch dengan nama produk sama, semuanya digabung di satu halaman.</p></div></div>
      <div class="field full" style="max-width:480px;margin-bottom:20px"><label>Nama Produk Lengkap</label><input type="text" id="detailProductSelect" list="dl_detailProduk" value="${escAttr(state.detailProductName)}" placeholder="Ketik untuk cari nama produk lengkap…"><datalist id="dl_detailProduk">${options}</datalist></div>
      ${body}
    `;
  }

  /* ---------------- EVENTS ---------------- */
  function attachEvents(){
    const app = document.getElementById('app');

    app.querySelectorAll('[data-action="goto-tab"]').forEach(el=>{ el.onclick = () => { state.tab = el.dataset.tab; render(); }; });

    const openSettingsBtn = app.querySelector('[data-action="open-settings"]');
    if(openSettingsBtn) openSettingsBtn.onclick = () => { state.settingsOpen = true; render(); };
    app.querySelectorAll('[data-action="close-settings"], [data-action="close-settings-overlay"]').forEach(el=>{
      el.onclick = (e) => { if(e.target !== el && el.dataset.action==='close-settings-overlay') return; state.settingsOpen = false; render(); };
    });
    const settingsLoginBtn = app.querySelector('[data-action="settings-login"]');
    if(settingsLoginBtn) settingsLoginBtn.onclick = async () => {
      const val = app.querySelector('#settingsPassInput').value;
      settingsLoginBtn.disabled = true;
      const result = await checkPassword('settings', val);
      settingsLoginBtn.disabled = false;
      if(result === true){ state.settingsUnlocked = true; state.settingsPassError = ''; render(); }
      else if(result === false){ state.settingsPassError = 'Password salah. Coba lagi.'; render(); }
      else { state.settingsUnlocked = true; state.settingsPassError = ''; render(); showToast('Belum terhubung ke Google Sheets — password Pengaturan belum aktif.'); }
    };
    const settingsPassInput = app.querySelector('#settingsPassInput');
    if(settingsPassInput) settingsPassInput.onkeydown = (e) => { if(e.key==='Enter') settingsLoginBtn.click(); };

    const saveSettingsBtn = app.querySelector('[data-action="save-settings"]');
    if(saveSettingsBtn) saveSettingsBtn.onclick = async () => {
      const url = app.querySelector('#scriptUrlInput').value;
      await saveScriptConfig(url);
      state.settingsOpen = false;
      showToast(state.syncError ? 'Tersimpan, tapi gagal terhubung. Cek URL.' : 'Tersambung ke Google Sheets.');
      render();
    };
    const testBtn = app.querySelector('[data-action="test-connection"]');
    if(testBtn) testBtn.onclick = async () => {
      const url = app.querySelector('#scriptUrlInput').value.trim();
      if(!url){ showToast('Isi URL dulu.'); return; }
      state.syncing = true; render();
      try{
        const res = await fetch(url, { method:'GET' });
        const json = await res.json();
        showToast(json && json.ok ? 'Koneksi berhasil ✔' : ('Gagal: ' + ((json&&json.error)||'respons tidak valid')));
      }catch(e){ showToast('Gagal terhubung. Periksa URL & pengaturan deployment.'); }
      state.syncing = false; render();
    };
    const toggleRevealBtn = app.querySelector('[data-action="toggle-reveal"]');
    if(toggleRevealBtn) toggleRevealBtn.onclick = () => { state.revealSecrets = !state.revealSecrets; render(); };

    const refreshBtn = app.querySelector('[data-action="refresh-sheet"]');
    if(refreshBtn) refreshBtn.onclick = async () => { await refreshFromSheet(); showToast('Data diperbarui dari Sheet.'); };

    const toggleArchiveBtn = app.querySelector('[data-action="toggle-archive"]');
    if(toggleArchiveBtn) toggleArchiveBtn.onclick = () => { state.showArchived = !state.showArchived; state.searchQuery=''; render(); };

    const searchInput = app.querySelector('#searchInput');
    if(searchInput) searchInput.oninput = () => { state.searchQuery = searchInput.value; refreshMasterTableWrap(); };

    const openCatBtn = app.querySelector('[data-action="open-category-modal"]');
    if(openCatBtn) openCatBtn.onclick = () => { state.categoryModalOpen = true; render(); };
    app.querySelectorAll('[data-action="close-category-modal"], [data-action="close-category-overlay"]').forEach(el=>{
      el.onclick = (e) => { if(e.target !== el && el.dataset.action==='close-category-overlay') return; state.categoryModalOpen = false; render(); };
    });
    app.querySelectorAll('[data-action="remove-category"]').forEach(el=>{
      el.onclick = async () => { const type = el.dataset.type, idx = parseInt(el.dataset.idx); state.categories[type].splice(idx,1); await saveCategories(); render(); };
    });
    app.querySelectorAll('[data-action="edit-category"]').forEach(el=>{
      el.onclick = async () => {
        const type = el.dataset.type, idx = parseInt(el.dataset.idx);
        const oldValue = state.categories[type][idx];
        const newValue = window.prompt('Ubah nilai "' + oldValue + '" menjadi:', oldValue);
        if(!newValue || !newValue.trim() || newValue.trim() === oldValue) return;
        const v = newValue.trim();
        state.categories[type][idx] = v;
        const changed = cascadeCategoryRename(type, oldValue, v);
        await saveCategories();
        if(changed) await saveProducts();
        showToast(changed ? 'Nilai diubah & data produk terkait ikut diperbarui.' : 'Nilai diubah.');
        render();
      };
    });

    const newBtn = app.querySelector('[data-action="new-product"]');
    if(newBtn) newBtn.onclick = () => {
      const p = emptyProduct(); p._isNew = true;
      state.editingProduct = p; state.drawerOpen = true; render();
    };
    attachMasterTableEvents();

    app.querySelectorAll('[data-action="close-drawer"], [data-action="overlay-close"]').forEach(el=>{
      el.onclick = (e) => { if(e.target !== el && el.dataset.action==='overlay-close') return; state.drawerOpen = false; state.editingProduct = null; render(); };
    });
    const drawerInner = app.querySelector('.drawer[data-stop]');
    if(drawerInner) drawerInner.onclick = (e)=> e.stopPropagation();

    if(state.drawerOpen){
      app.querySelectorAll('[data-field]').forEach(el=>{
        el.oninput = () => {
          const f = el.dataset.field;
          if(f === 'kode'){ state.editingProduct.kode = el.value; state.editingProduct._kodeAuto = false; }
          else { state.editingProduct[f] = el.value; }
          const box = app.querySelector('.computed-box');
          if(box && (f==='namaProdukLengkapOverride')){ box.textContent = fullName(state.editingProduct) || '—'; }
        };
      });
      const resetKodeLink = app.querySelector('[data-action="reset-kode-auto"]');
      if(resetKodeLink) resetKodeLink.onclick = (e) => {
        e.preventDefault();
        state.editingProduct._kodeAuto = true;
        state.editingProduct.kode = computeAutoKode(state.editingProduct.namaProduk, state.editingProduct._isNew ? null : state.editingProduct.id);
        render();
      };

      app.querySelectorAll('[data-field-select]').forEach(el=>{
        el.onchange = async () => {
          const field = el.dataset.fieldSelect;
          if(el.value === '__add_new__'){
            const type = field;
            const newVal = window.prompt('Masukkan nilai baru untuk ' + categoryLabel(type) + ':');
            if(newVal && newVal.trim()){
              const v = newVal.trim();
              if(!state.categories[type]) state.categories[type] = [];
              if(!state.categories[type].includes(v)) state.categories[type].push(v);
              state.editingProduct[field] = v;
              await saveCategories();
              // Rebuild dropdown options only, no full render
              el.innerHTML = optionsHtml(state.categories[type], v);
            } else { state.editingProduct[field] = ''; el.value = ''; return; }
          } else {
            state.editingProduct[field] = el.value;
            if(field === 'namaProduk' && state.editingProduct._isNew && state.editingProduct._kodeAuto !== false){
              state.editingProduct.kode = computeAutoKode(state.editingProduct.namaProduk, null);
              const kodeEl = document.querySelector('[data-field="kode"]');
              if(kodeEl) kodeEl.value = state.editingProduct.kode;
            }
            return; // No render needed for normal selection!
          }
        };
      });

      app.querySelectorAll('[data-jadwal="tanggal"]').forEach(el=>{ el.oninput = () => { state.editingProduct.jadwal[parseInt(el.dataset.idx)].tanggal = el.value; }; });
      app.querySelectorAll('[data-jadwal="nomorBatch"]').forEach(el=>{ el.oninput = () => { state.editingProduct.jadwal[parseInt(el.dataset.idx)].nomorBatch = el.value; }; });
      app.querySelectorAll('[data-jadwal="tahapan"]').forEach(el=>{
        el.onchange = async () => {
          const idx = parseInt(el.dataset.idx);
          if(el.value === '__add_new__'){
            const newVal = window.prompt('Masukkan tahapan baru (mis. Validasi Proses 7):');
            if(newVal && newVal.trim()){
              const v = newVal.trim();
              if(!state.categories.tahapan) state.categories.tahapan = [];
              if(!state.categories.tahapan.includes(v)) state.categories.tahapan.push(v);
              state.editingProduct.jadwal[idx].tahapan = v;
              await saveCategories();
              el.innerHTML = optionsHtml(state.categories.tahapan, v);
            } else { state.editingProduct.jadwal[idx].tahapan = ''; el.value = ''; }
          } else {
            state.editingProduct.jadwal[idx].tahapan = el.value;
            // No render needed
          }
        };
      });
      const addJadwalBtn = app.querySelector('[data-action="add-jadwal"]');
      if(addJadwalBtn) addJadwalBtn.onclick = () => {
        state.editingProduct.jadwal.push({tahapan:'', tanggal:'', nomorBatch:''});
        render();
      };
      app.querySelectorAll('[data-action="remove-jadwal"]').forEach(el=>{
        el.onclick = () => {
          state.editingProduct.jadwal.splice(parseInt(el.dataset.idx),1);
          if(state.editingProduct.jadwal.length===0) state.editingProduct.jadwal.push({tahapan:'',tanggal:'',nomorBatch:''});
          renderKeepScroll();
        };
      });
      app.querySelectorAll('[data-action="move-jadwal-up"]').forEach(el=>{
        el.onclick = () => { moveArrayItem(state.editingProduct.jadwal, parseInt(el.dataset.idx), -1); render(); };
      });
      app.querySelectorAll('[data-action="move-jadwal-down"]').forEach(el=>{
        el.onclick = () => { moveArrayItem(state.editingProduct.jadwal, parseInt(el.dataset.idx), 1); render(); };
      });

      app.querySelectorAll('input[data-nested]').forEach(el=>{
        el.oninput = () => {
          setNested(state.editingProduct, el.dataset.nested, el.value);
          if(el.dataset.nested === 'yieldData.bobotTeoritis' || el.dataset.nested === 'yieldData.bobotAktual'){
            const teoritis = parseFloat(state.editingProduct.yieldData.bobotTeoritis);
            const aktual = parseFloat(state.editingProduct.yieldData.bobotAktual);
            if(!isNaN(teoritis) && teoritis !== 0 && !isNaN(aktual)){
              const rekon = (aktual / teoritis) * 100;
              const rekonStr = formatNum(rekon);
              state.editingProduct.yieldData.rekonsiliasi = rekonStr;
              const rekonInput = app.querySelector('[data-nested="yieldData.rekonsiliasi"]');
              if(rekonInput) rekonInput.value = rekonStr;
            }
          }
        };
      });
      app.querySelectorAll('select[data-nested]').forEach(el=>{
        el.onchange = async () => {
          const path = el.dataset.nested;
          const catType = el.dataset.cat || 'kebersihan';
          if(el.value === '__add_new__'){
            const newVal = window.prompt('Masukkan nilai baru untuk ' + categoryLabel(catType) + ':');
            if(newVal && newVal.trim()){
              const v = newVal.trim();
              if(!state.categories[catType]) state.categories[catType] = [];
              if(!state.categories[catType].includes(v)) state.categories[catType].push(v);
              setNested(state.editingProduct, path, v);
              await saveCategories();
              el.innerHTML = optionsHtml(state.categories[catType], v);
            } else {
              setNested(state.editingProduct, path, ''); el.value = ''; return;
            }
          } else {
            setNested(state.editingProduct, path, el.value);
            return; // No render needed!
          }
        };
      });

      app.querySelectorAll('[data-field-external]').forEach(el=>{
        el.oninput = () => { state.editingProduct[el.dataset.fieldExternal] = el.value; };
      });

      app.querySelectorAll('[data-eval-radio]').forEach(el=>{
        el.onchange = () => { state.editingProduct.evaluasiKesimpulan = el.value; };
      });

      DYNAMIC_TABLES.forEach(cfg=>{
        app.querySelectorAll(`[data-dyn^="${cfg.key}:"]`).forEach(el=>{
          const field = el.dataset.dyn.split(':')[1];
          const idx = parseInt(el.dataset.idx);
          const col = cfg.columns.find(c=>c.field===field);
          if(col.type === 'select'){
            el.onchange = async () => {
              if(el.value === '__add_new__'){
                const newVal = window.prompt('Masukkan nilai baru untuk ' + categoryLabel(col.cat) + ':');
                if(newVal && newVal.trim()){
                  const v = newVal.trim();
                  if(!state.categories[col.cat]) state.categories[col.cat] = [];
                  if(!state.categories[col.cat].includes(v)) state.categories[col.cat].push(v);
                  state.editingProduct[cfg.key][idx][field] = v;
                  await saveCategories();
                  el.innerHTML = optionsHtml(state.categories[col.cat], v);
                } else { state.editingProduct[cfg.key][idx][field] = ''; el.value = ''; }
              } else {
                state.editingProduct[cfg.key][idx][field] = el.value;
                // No render needed for normal selection
              }
            };
          } else if(col.type === 'fixedselect'){
            el.onchange = () => {
              state.editingProduct[cfg.key][idx][field] = el.value;
              if(cfg.key === 'saranaPenunjang' && field === 'jenisDokumen'){
                autofillSaranaPenunjangRow(idx);
              }
            };
          } else if(col.type === 'externalBahanBaku'){
            el.oninput = () => {
              const val = el.value;
              state.editingProduct[cfg.key][idx][field] = val;
              const match = (state.externalLists.bahanBaku||[]).find(i=>i.kode===val);
              if(match){
                if(cfg.key === 'spesifikasiBahanBaku'){
                  const row = state.editingProduct[cfg.key][idx];
                  row.namaDagang = match.nama || '';
                  row.namaProdusen = match.produsen || '';
                  row.namaSupplier = match.pemasok || '';
                }
                if(cfg.key === 'formula'){
                  ensureSpesifikasiBahanBakuRow(val);
                }
                render();
              }
            };
          } else if(col.type === 'externalBahanBakuDoc'){
            el.oninput = () => { state.editingProduct[cfg.key][idx][field] = el.value; };
          } else if(col.type === 'externalInventaris'){
            el.oninput = () => {
              const val = el.value;
              state.editingProduct[cfg.key][idx][field] = val;
              const match = (state.inventarisMaster||[]).find(i=>i.namaInventaris===val);
              if(match){
                const row = state.editingProduct[cfg.key][idx];
                row.nomorInventaris = match.nomorInventaris || '';
                const namaLower = val.trim().toLowerCase();
                let kalMatches = (state.jadwalKalibrasi||[]).filter(k=>!k.deleted && k.kodeItem===match.nomorInventaris && k.calDate);
                if(!kalMatches.length){
                  // fallback: kode di Daftar Induk Inventaris beda format dengan Kode Item Jadwal Kalibrasi,
                  // coba cocokkan lewat nama alat saja sebagai perkiraan awal.
                  kalMatches = (state.jadwalKalibrasi||[]).filter(k=>!k.deleted && k.calDate && String(k.namaAlat||'').trim().toLowerCase()===namaLower);
                }
                if(kalMatches.length){
                  const latest = kalMatches.reduce((a,b)=> (a.calDate > b.calDate ? a : b));
                  row.tanggalKalibrasi = formatDateID(latest.calDate);
                } else {
                  row.tanggalKalibrasi = '-';
                }
                const dpMatches = (state.dataPeralatan||[]).filter(d=>!d.deleted && d.namaAlat===val && d.jenisDokumen);
                row.tanggalKualifikasi = dpMatches.length
                  ? dpMatches.map(d=>`${d.jenisDokumen}: ${formatDateID(d.tanggal)||'-'}`).join(', ')
                  : '-';
                render();
              }
            };
          } else if(col.type === 'externalSaranaPenunjang'){
            el.oninput = () => {
              state.editingProduct[cfg.key][idx][field] = el.value;
              autofillSaranaPenunjangRow(idx);
            };
          } else {
            el.oninput = () => {
              state.editingProduct[cfg.key][idx][field] = el.value;
              if(cfg.key === 'formula' && field === 'konsentrasiPercent'){
                const pct = parseFloat(el.value);
                const batchSize = parseFloat(state.editingProduct.batchSize);
                if(!isNaN(pct) && !isNaN(batchSize)){
                  const jumlah = (pct/100) * batchSize * 1000;
                  const jumlahStr = formatNum(jumlah);
                  state.editingProduct.formula[idx].jumlahG = jumlahStr;
                  const jumlahInput = app.querySelector(`[data-dyn="formula:jumlahG"][data-idx="${idx}"]`);
                  if(jumlahInput) jumlahInput.value = jumlahStr;
                }
              }
              if(cfg.key === 'formula'){
                const t = computeFormulaTotals(state.editingProduct.formula);
                const tp = app.querySelector('#formulaTotalPercent');
                const tg = app.querySelector('#formulaTotalGram');
                if(tp) tp.textContent = formatNum(t.totalPercent);
                if(tg) tg.textContent = formatNum(t.totalGram);
              }
            };
          }
        });
      });
      app.querySelectorAll('[data-action="add-dyn-row"]').forEach(el=>{
        el.onclick = () => { const cfg = DYNAMIC_TABLES.find(t=>t.key===el.dataset.table); state.editingProduct[cfg.key].push(emptyRowFor(cfg)); render(); };
      });
      app.querySelectorAll('[data-action="copy-from-previous"]').forEach(el=>{
        el.onclick = () => {
          const tableKey = el.dataset.table;
          const sourceProduct = state.products.find(x=>x.id===el.dataset.sourceId);
          if(!sourceProduct) return;
          const hasCurrentData = (state.editingProduct[tableKey]||[]).some(row=>Object.values(row).some(v=>v));
          if(hasCurrentData && !confirm('Ini akan menimpa isian yang sedang kamu edit di tabel ini. Lanjutkan?')) return;
          state.editingProduct[tableKey] = JSON.parse(JSON.stringify(sourceProduct[tableKey]));
          showToast('Data berhasil disalin.');
          render();
        };
      });
      app.querySelectorAll('[data-action="remove-dyn-row"]').forEach(el=>{
        el.onclick = () => {
          const cfg = DYNAMIC_TABLES.find(t=>t.key===el.dataset.table);
          state.editingProduct[cfg.key].splice(parseInt(el.dataset.idx),1);
          if(state.editingProduct[cfg.key].length===0) state.editingProduct[cfg.key].push(emptyRowFor(cfg));
          render();
        };
      });
      app.querySelectorAll('[data-action="move-dyn-row-up"]').forEach(el=>{
        el.onclick = () => { moveArrayItem(state.editingProduct[el.dataset.table], parseInt(el.dataset.idx), -1); render(); };
      });
      app.querySelectorAll('[data-action="move-dyn-row-down"]').forEach(el=>{
        el.onclick = () => { moveArrayItem(state.editingProduct[el.dataset.table], parseInt(el.dataset.idx), 1); render(); };
      });

      app.querySelectorAll('[data-flow-idx]').forEach(el=>{
        el.oninput = () => {
          state.editingProduct.alurProsesTahapan[parseInt(el.dataset.flowIdx)] = el.value;
          const preview = document.getElementById('flowchartPreview');
          if(preview) preview.innerHTML = buildFlowchartSVG(state.editingProduct.alurProsesTahapan);
        };
      });
      const addFlowBtn = app.querySelector('[data-action="add-flow-step"]');
      if(addFlowBtn) addFlowBtn.onclick = () => { state.editingProduct.alurProsesTahapan.push(''); render(); };
      app.querySelectorAll('[data-action="remove-flow-step"]').forEach(el=>{
        el.onclick = () => {
          state.editingProduct.alurProsesTahapan.splice(parseInt(el.dataset.idx),1);
          if(state.editingProduct.alurProsesTahapan.length===0) state.editingProduct.alurProsesTahapan.push('');
          render();
        };
      });
      app.querySelectorAll('[data-action="move-flow-step-up"]').forEach(el=>{
        el.onclick = () => { moveArrayItem(state.editingProduct.alurProsesTahapan, parseInt(el.dataset.idx), -1); render(); };
      });
      app.querySelectorAll('[data-action="move-flow-step-down"]').forEach(el=>{
        el.onclick = () => { moveArrayItem(state.editingProduct.alurProsesTahapan, parseInt(el.dataset.idx), 1); render(); };
      });

      const saveBtn = app.querySelector('[data-action="save-product"]');
      if(saveBtn) saveBtn.onclick = async () => {
        if(!state.editingProduct.kode || !state.editingProduct.merk){ showToast('Kode dan Merk wajib diisi.'); return; }
        const idx = state.products.findIndex(x=>x.id===state.editingProduct.id);
        const clean = JSON.parse(JSON.stringify(state.editingProduct));
        delete clean._isNew; delete clean._kodeAuto;
        if(idx>=0) state.products[idx] = clean; else state.products.push(clean);
        await saveProducts();
        state.drawerOpen = false; state.editingProduct = null;
        showToast('Data produk tersimpan.'); render();
      };
    }

    const loginBtn = app.querySelector('[data-action="lock-login"]');
    if(loginBtn) loginBtn.onclick = async () => {
      const val = app.querySelector('#lockPassInput').value;
      loginBtn.disabled = true;
      const result = await checkPassword('lockqa', val);
      loginBtn.disabled = false;
      if(result === true){ state.lockLoggedIn = true; state.lockLoginError=''; render(); }
      else if(result === false){ state.lockLoginError = 'Kata sandi salah. Coba lagi.'; render(); }
      else { state.lockLoggedIn = true; state.lockLoginError=''; render(); showToast('Belum terhubung ke Google Sheets — password Lock QA belum aktif.'); }
    };
    const passInput = app.querySelector('#lockPassInput');
    if(passInput) passInput.onkeydown = (e)=>{ if(e.key==='Enter') loginBtn.click(); };

    const logoutBtn = app.querySelector('[data-action="lock-logout"]');
    if(logoutBtn) logoutBtn.onclick = () => { state.lockLoggedIn = false; render(); };

    const newLockBtn = app.querySelector('[data-action="new-lock"]');
    if(newLockBtn) newLockBtn.onclick = () => {
      state.editingLock = {id:uid(), tanggalBerlaku:'', noDokumen:'', alasanPerubahan:'', kodeId:'', status:'Menunggu', _isNew:true};
      state.lockDrawerOpen = true; render();
    };
    app.querySelectorAll('[data-action="edit-lock"]').forEach(el=>{
      el.onclick = () => { const orig = state.lockqa.find(x=>x.id===el.dataset.id); state.editingLock = JSON.parse(JSON.stringify(orig)); state.lockDrawerOpen = true; render(); };
    });
    app.querySelectorAll('[data-action="delete-lock"]').forEach(el=>{
      el.onclick = async () => { if(!confirm('Hapus pengajuan ini?')) return; state.lockqa = state.lockqa.filter(x=>x.id!==el.dataset.id); await saveLockQA(); showToast('Pengajuan dihapus.'); render(); };
    });
    app.querySelectorAll('[data-action="close-lock-drawer"], [data-action="lock-overlay-close"]').forEach(el=>{
      el.onclick = (e) => { if(e.target !== el && el.dataset.action==='lock-overlay-close') return; state.lockDrawerOpen=false; state.editingLock=null; render(); };
    });
    if(state.lockDrawerOpen){
      const lockDrawerInner = app.querySelector('.drawer[data-stop]');
      if(lockDrawerInner) lockDrawerInner.onclick = (e)=>e.stopPropagation();
      app.querySelectorAll('[data-lockfield]').forEach(el=>{
        el.oninput = () => { state.editingLock[el.dataset.lockfield] = el.value; };
        el.onchange = () => { state.editingLock[el.dataset.lockfield] = el.value; };
      });
      const saveLockBtn = app.querySelector('[data-action="save-lock"]');
      if(saveLockBtn) saveLockBtn.onclick = async () => {
        if(!state.editingLock.kodeId || !state.editingLock.noDokumen){ showToast('Kode produk dan No. Dokumen wajib diisi.'); return; }
        const idx = state.lockqa.findIndex(x=>x.id===state.editingLock.id);
        const clean = JSON.parse(JSON.stringify(state.editingLock));
        delete clean._isNew;
        if(idx>=0) state.lockqa[idx] = clean; else state.lockqa.push(clean);
        await saveLockQA();
        state.lockDrawerOpen=false; state.editingLock=null;
        showToast('Pengajuan Lock QA tersimpan.'); render();
      };
    }

    const detailSelect = app.querySelector('#detailProductSelect');
    if(detailSelect) detailSelect.oninput = () => {
      const typed = detailSelect.value;
      if(typed.trim() === ''){ state.detailProductName = ''; render(); return; }
      const list = uniqueNamaProdukList();
      const match = list.find(n => n.toLowerCase() === typed.trim().toLowerCase());
      if(match){ state.detailProductName = match; render(); }
    };

    // Jadwal Kalibrasi
    app.querySelectorAll('[data-action="kalibrasi-goto-dept"]').forEach(el=>{
      el.onclick = () => { state.kalibrasiDept = el.dataset.dept; state.kalibrasiShowArchived = false; render(); };
    });
    const kalToggleArchiveBtn = app.querySelector('[data-action="kalibrasi-toggle-archive"]');
    if(kalToggleArchiveBtn) kalToggleArchiveBtn.onclick = () => { state.kalibrasiShowArchived = !state.kalibrasiShowArchived; render(); };
    const kalAddBtn = app.querySelector('[data-action="kalibrasi-add-row"]');
    if(kalAddBtn) kalAddBtn.onclick = async () => {
      state.jadwalKalibrasi.push(emptyKalibrasiEntry(state.kalibrasiDept));
      await saveJadwalKalibrasi();
      render();
    };
    app.querySelectorAll('[data-action="kalibrasi-delete"]').forEach(el=>{
      el.onclick = async () => {
        if(!confirm('Hapus data alat ini? Data tetap tersimpan di Arsip.')) return;
        const item = state.jadwalKalibrasi.find(k=>k.id===el.dataset.id);
        if(item) item.deleted = true;
        await saveJadwalKalibrasi(); showToast('Dipindah ke Arsip.'); render();
      };
    });
    app.querySelectorAll('[data-action="kalibrasi-restore"]').forEach(el=>{
      el.onclick = async () => {
        const item = state.jadwalKalibrasi.find(k=>k.id===el.dataset.id);
        if(item) item.deleted = false;
        await saveJadwalKalibrasi(); showToast('Dipulihkan.'); render();
      };
    });
    app.querySelectorAll('[data-action="kalibrasi-purge"]').forEach(el=>{
      el.onclick = async () => {
        if(!confirm('Hapus PERMANEN data ini? Tidak bisa dibatalkan.')) return;
        state.jadwalKalibrasi = state.jadwalKalibrasi.filter(k=>k.id!==el.dataset.id);
        await saveJadwalKalibrasi(); showToast('Dihapus permanen.'); render();
      };
    });
    app.querySelectorAll('[data-action="move-kalibrasi-row-up"], [data-action="move-kalibrasi-row-down"]').forEach(el=>{
      el.onclick = async () => {
        const dir = el.dataset.action.endsWith('up') ? -1 : 1;
        const visibleList = (state.jadwalKalibrasi||[]).filter(k => k.departemen===state.kalibrasiDept && !k.deleted);
        const idx = parseInt(el.dataset.idx);
        const itemA = visibleList[idx];
        const itemB = visibleList[idx+dir];
        if(!itemA || !itemB) return;
        const realIdxA = state.jadwalKalibrasi.indexOf(itemA);
        const realIdxB = state.jadwalKalibrasi.indexOf(itemB);
        state.jadwalKalibrasi[realIdxA] = itemB;
        state.jadwalKalibrasi[realIdxB] = itemA;
        await saveJadwalKalibrasi(); render();
      };
    });
    app.querySelectorAll('[data-kal]').forEach(el=>{
      el.oninput = () => {
        const item = state.jadwalKalibrasi.find(k=>k.id===el.dataset.id);
        if(item) item[el.dataset.kal] = el.value;
      };
    });
    const exportKalBtn = app.querySelector('[data-action="export-kalibrasi-excel"]');
    if(exportKalBtn) exportKalBtn.onclick = async () => { await exportKalibrasiExcel(); };
    const kalSaveBtn = app.querySelector('[data-action="kalibrasi-save"]');
    if(kalSaveBtn) kalSaveBtn.onclick = async () => { await saveJadwalKalibrasi(); showToast('Perubahan Jadwal Kalibrasi tersimpan.'); };

    // Peralatan & Sarana Penunjang - navigasi sub-tab
    app.querySelectorAll('[data-action="peralatansarana-subtab"]').forEach(el=>{
      el.onclick = () => { state.peralatanSaranaSubTab = el.dataset.subtab; render(); };
    });

    // Data Peralatan
    const dpAddBtn = app.querySelector('[data-action="dp-add-row"]');
    if(dpAddBtn) dpAddBtn.onclick = async () => { state.dataPeralatan.push(emptyDataPeralatanEntry()); await saveDataPeralatan(); render(); };
    const dpToggleArchiveBtn = app.querySelector('[data-action="dp-toggle-archive"]');
    if(dpToggleArchiveBtn) dpToggleArchiveBtn.onclick = () => { state.dataPeralatanShowArchived = !state.dataPeralatanShowArchived; render(); };
    const dpSaveBtn = app.querySelector('[data-action="dp-save"]');
    if(dpSaveBtn) dpSaveBtn.onclick = async () => { await saveDataPeralatan(); showToast('Perubahan Data Peralatan tersimpan.'); };
    app.querySelectorAll('[data-action="dp-delete"]').forEach(el=>{
      el.onclick = async () => {
        if(!confirm('Hapus data ini? Data tetap tersimpan di Arsip.')) return;
        const item = state.dataPeralatan.find(r=>r.id===el.dataset.id);
        if(item) item.deleted = true;
        await saveDataPeralatan(); showToast('Dipindah ke Arsip.'); render();
      };
    });
    app.querySelectorAll('[data-action="dp-restore"]').forEach(el=>{
      el.onclick = async () => {
        const item = state.dataPeralatan.find(r=>r.id===el.dataset.id);
        if(item) item.deleted = false;
        await saveDataPeralatan(); showToast('Dipulihkan.'); render();
      };
    });
    app.querySelectorAll('[data-action="dp-purge"]').forEach(el=>{
      el.onclick = async () => {
        if(!confirm('Hapus PERMANEN data ini? Tidak bisa dibatalkan.')) return;
        state.dataPeralatan = state.dataPeralatan.filter(r=>r.id!==el.dataset.id);
        await saveDataPeralatan(); showToast('Dihapus permanen.'); render();
      };
    });
    app.querySelectorAll('[data-action="move-dp-row-up"], [data-action="move-dp-row-down"]').forEach(el=>{
      el.onclick = async () => {
        const dir = el.dataset.action.endsWith('up') ? -1 : 1;
        const visibleList = (state.dataPeralatan||[]).filter(r => !r.deleted);
        const idx = parseInt(el.dataset.idx);
        const a = visibleList[idx], b = visibleList[idx+dir];
        if(!a || !b) return;
        const ia = state.dataPeralatan.indexOf(a), ib = state.dataPeralatan.indexOf(b);
        state.dataPeralatan[ia] = b; state.dataPeralatan[ib] = a;
        await saveDataPeralatan(); render();
      };
    });
    app.querySelectorAll('[data-dp]').forEach(el=>{
      const handler = () => {
        const item = state.dataPeralatan.find(r=>r.id===el.dataset.id);
        if(item) item[el.dataset.dp] = el.value;
      };
      if(el.tagName === 'SELECT') el.onchange = handler; else el.oninput = handler;
    });

    // Sarana Penunjang Master
    const spAddBtn = app.querySelector('[data-action="sp-add-row"]');
    if(spAddBtn) spAddBtn.onclick = async () => { state.saranaPenunjangMaster.push(emptySaranaPenunjangMasterEntry()); await saveSaranaPenunjangMaster(); render(); };
    const spToggleArchiveBtn = app.querySelector('[data-action="sp-toggle-archive"]');
    if(spToggleArchiveBtn) spToggleArchiveBtn.onclick = () => { state.saranaPenunjangShowArchived = !state.saranaPenunjangShowArchived; render(); };
    const spSaveBtn = app.querySelector('[data-action="sp-save"]');
    if(spSaveBtn) spSaveBtn.onclick = async () => { await saveSaranaPenunjangMaster(); showToast('Perubahan Sarana Penunjang tersimpan.'); };
    app.querySelectorAll('[data-action="sp-delete"]').forEach(el=>{
      el.onclick = async () => {
        if(!confirm('Hapus data ini? Data tetap tersimpan di Arsip.')) return;
        const item = state.saranaPenunjangMaster.find(r=>r.id===el.dataset.id);
        if(item) item.deleted = true;
        await saveSaranaPenunjangMaster(); showToast('Dipindah ke Arsip.'); render();
      };
    });
    app.querySelectorAll('[data-action="sp-restore"]').forEach(el=>{
      el.onclick = async () => {
        const item = state.saranaPenunjangMaster.find(r=>r.id===el.dataset.id);
        if(item) item.deleted = false;
        await saveSaranaPenunjangMaster(); showToast('Dipulihkan.'); render();
      };
    });
    app.querySelectorAll('[data-action="sp-purge"]').forEach(el=>{
      el.onclick = async () => {
        if(!confirm('Hapus PERMANEN data ini? Tidak bisa dibatalkan.')) return;
        state.saranaPenunjangMaster = state.saranaPenunjangMaster.filter(r=>r.id!==el.dataset.id);
        await saveSaranaPenunjangMaster(); showToast('Dihapus permanen.'); render();
      };
    });
    app.querySelectorAll('[data-action="move-sp-row-up"], [data-action="move-sp-row-down"]').forEach(el=>{
      el.onclick = async () => {
        const dir = el.dataset.action.endsWith('up') ? -1 : 1;
        const visibleList = (state.saranaPenunjangMaster||[]).filter(r => !r.deleted);
        const idx = parseInt(el.dataset.idx);
        const a = visibleList[idx], b = visibleList[idx+dir];
        if(!a || !b) return;
        const ia = state.saranaPenunjangMaster.indexOf(a), ib = state.saranaPenunjangMaster.indexOf(b);
        state.saranaPenunjangMaster[ia] = b; state.saranaPenunjangMaster[ib] = a;
        await saveSaranaPenunjangMaster(); render();
      };
    });
    app.querySelectorAll('[data-sp]').forEach(el=>{
      const handler = () => {
        const item = state.saranaPenunjangMaster.find(r=>r.id===el.dataset.id);
        if(item) item[el.dataset.sp] = el.value;
      };
      if(el.tagName === 'SELECT') el.onchange = handler; else el.oninput = handler;
    });

    app.querySelectorAll('[data-action="export-docx"]').forEach(el=>{
      el.onclick = async () => {
        const p = state.products.find(x=>x.id===el.dataset.id);
        if(!p) return;
        el.disabled = true; const origText = el.textContent; el.textContent = 'Membuat file…';
        try{ await downloadDocx(p); }catch(e){ showToast('Gagal membuat file Word: ' + e.message); }
        el.disabled = false; el.textContent = origText;
      };
    });
    app.querySelectorAll('[data-action="export-pdf"]').forEach(el=>{
      el.onclick = () => {
        const p = state.products.find(x=>x.id===el.dataset.id);
        if(!p) return;
        printAsPdf(p);
      };
    });
  }

  function renderSettingsModal(){
    if(!state.settingsUnlocked){
      return `
      <div class="overlay" data-action="close-settings-overlay">
        <div class="drawer" style="width:min(420px,96vw)" data-stop="1">
          <div class="drawer-head"><h3>⚙ Pengaturan Terkunci</h3><button class="drawer-close" data-action="close-settings">✕</button></div>
          <div class="drawer-body" style="text-align:center;padding-top:10px">
            <div class="stamp">ADMIN<br>ONLY</div>
            <h2 style="font-size:15px;margin-bottom:4px">Masuk ke Pengaturan</h2>
            <p style="font-size:13px;color:var(--text-muted);margin-bottom:18px">Halaman ini hanya untuk admin yang mengelola sinkronisasi Google Sheets.</p>
            <input type="password" id="settingsPassInput" placeholder="Password Pengaturan" style="text-align:center;letter-spacing:2px;margin-bottom:10px">
            ${state.settingsPassError ? `<div class="login-error">${escapeHtml(state.settingsPassError)}</div>` : ''}
            <button class="btn btn-primary" style="width:100%;justify-content:center" data-action="settings-login">Masuk</button>
          </div>
        </div>
      </div>`;
    }
    const inputType = state.revealSecrets ? 'text' : 'password';
    return `
    <div class="overlay" data-action="close-settings-overlay">
      <div class="drawer" style="width:min(560px,96vw)" data-stop="1">
        <div class="drawer-head"><h3>⚙ Pengaturan Sinkronisasi Google Sheets</h3><button class="drawer-close" data-action="close-settings">✕</button></div>
        <div class="drawer-body">
          <p style="font-size:13.5px;color:var(--text-muted);line-height:1.6">Tempel <strong>URL Web App</strong> dari Google Apps Script kamu di sini. Setting ini berlaku untuk seluruh tim yang membuka website ini.</p>
          <div class="field" style="margin:16px 0"><label>URL Apps Script (diakhiri /exec)</label><input type="${inputType}" id="scriptUrlInput" class="mono" value="${escAttr(state.scriptUrl)}" placeholder="https://script.google.com/macros/s/xxxx/exec"></div>
          <button type="button" class="btn btn-ghost btn-sm" data-action="toggle-reveal" style="margin-bottom:16px">${state.revealSecrets ? '🙈 Sembunyikan' : '👁 Tampilkan'}</button>
          <div style="display:flex;gap:10px;margin-bottom:6px">
            <button class="btn btn-primary" data-action="save-settings">Simpan &amp; Sambungkan</button>
            <button class="btn btn-ghost" data-action="test-connection">Tes Koneksi</button>
          </div>
          <p class="hint">Belum punya URL-nya? Minta file "AppsScript.gs" ke tim yang membuat website ini, lalu ikuti panduan setup di bagian atas file tersebut.</p>
        </div>
      </div>
    </div>`;
  }

  (async function bootstrap(){
    await loadScriptUrlConfig();
    render();
  })();
})();

  // ── SCROLL-PRESERVING RENDER WRAPPER ──
  function renderKeepScroll(){
    const sy = window.scrollY;
    render();
    requestAnimationFrame(()=>{ window.scrollTo({top:sy, behavior:'instant'}); });
  }

</script>
</body>
</html>
