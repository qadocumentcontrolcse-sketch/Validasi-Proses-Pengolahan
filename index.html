<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Validasi Proses Mixing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F3F6F6; --surface:#FFFFFF; --primary:#0F5C5C; --primary-dark:#0A4141; --primary-tint:#E4EFEE;
    --accent:#C77D2E; --accent-tint:#FBEDDD; --text:#1B2B2B; --text-muted:#5C7070; --border:#DEE7E6;
    --success:#2F7D4F; --success-bg:#E9F5EE; --danger:#B3261E; --danger-bg:#FBEAEA; --warn:#946200; --warn-bg:#FDF3DC;
    --radius:10px; --shadow:0 1px 2px rgba(15,50,50,0.06), 0 6px 20px rgba(15,50,50,0.05);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  #app{min-height:100vh;display:flex;flex-direction:column;}
  .topbar{background:var(--primary-dark);color:#fff;padding:16px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
  .brand{display:flex;align-items:center;gap:12px;}
  .brand-mark{width:38px;height:38px;border-radius:9px;background:linear-gradient(135deg,var(--primary),#177373);display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:13px;box-shadow:inset 0 0 0 1px rgba(255,255,255,0.15);}
  .brand-text h1{font-size:16px;margin:0;font-weight:600;}
  .brand-text p{font-size:12px;margin:2px 0 0;color:#B8D0CE;}
  .tabs{display:flex;gap:6px;background:rgba(255,255,255,0.08);padding:4px;border-radius:10px;flex-wrap:wrap;}
  .tab-btn{border:none;background:transparent;color:#CFE3E1;padding:9px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s ease;font-family:inherit;white-space:nowrap;}
  .tab-btn.active{background:#fff;color:var(--primary-dark);}
  .tab-btn:not(.active):hover{background:rgba(255,255,255,0.12);color:#fff;}
  main{flex:1;padding:28px;max-width:1360px;margin:0 auto;width:100%;}
  .page-head{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:14px;margin-bottom:16px;}
  .page-head h2{font-size:20px;margin:0 0 4px;}
  .page-head p{margin:0;color:var(--text-muted);font-size:13.5px;}
  .btn{border:none;cursor:pointer;font-family:inherit;font-weight:600;font-size:13.5px;padding:10px 18px;border-radius:8px;transition:transform .1s ease;display:inline-flex;align-items:center;gap:8px;white-space:nowrap;}
  .btn:active{transform:scale(0.98);}
  .btn-primary{background:var(--primary);color:#fff;}
  .btn-primary:hover{background:var(--primary-dark);}
  .btn-ghost{background:transparent;color:var(--primary-dark);border:1px solid var(--border);}
  .btn-ghost:hover{background:var(--primary-tint);}
  .btn-sm{padding:6px 12px;font-size:12.5px;border-radius:6px;}
  .btn[disabled]{opacity:0.5;cursor:not-allowed;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);}
  .table-wrap{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;padding:10px 12px;background:var(--primary-tint);color:var(--primary-dark);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.4px;white-space:nowrap;position:sticky;top:0;z-index:2;}
  td{padding:10px 12px;border-top:1px solid var(--border);vertical-align:top;white-space:nowrap;}
  tbody tr:hover{background:#FAFCFC;}
  .code-badge{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:12px;background:var(--primary-tint);color:var(--primary-dark);padding:3px 9px;border-radius:20px;border:1px solid #CFE3E1;}
  .empty-state{padding:60px 20px;text-align:center;color:var(--text-muted);}
  .empty-state .icon{font-size:34px;margin-bottom:10px;}
  .empty-state h3{margin:0 0 6px;color:var(--text);font-size:15px;}
  .empty-state p{margin:0;font-size:13px;}
  .search-box{position:relative;max-width:340px;flex:1;min-width:220px;}
  .search-box input{padding-left:34px;}
  .search-box .icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:14px;}
  .overlay{position:fixed;inset:0;background:rgba(15,30,30,0.45);display:flex;justify-content:flex-end;z-index:50;animation:fadeIn .15s ease;}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .drawer{background:var(--bg);width:min(760px,96vw);height:100%;overflow-y:auto;box-shadow:-8px 0 24px rgba(0,0,0,0.15);animation:slideIn .18s ease;}
  @keyframes slideIn{from{transform:translateX(24px);opacity:0}to{transform:translateX(0);opacity:1}}
  .drawer-head{position:sticky;top:0;background:var(--primary-dark);color:#fff;padding:18px 24px;display:flex;justify-content:space-between;align-items:center;z-index:2;}
  .drawer-head h3{margin:0;font-size:16px;}
  .drawer-close{background:rgba(255,255,255,0.12);border:none;color:#fff;width:30px;height:30px;border-radius:7px;cursor:pointer;font-size:15px;}
  .drawer-body{padding:22px 24px 90px;}
  .section-title{font-size:12.5px;font-weight:700;color:var(--primary-dark);text-transform:uppercase;letter-spacing:0.5px;margin:26px 0 12px;display:flex;align-items:center;gap:8px;}
  .section-title:first-child{margin-top:0;}
  .section-title .n{background:var(--accent);color:#fff;width:20px;height:20px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
  .field{margin-bottom:2px;}
  .field.full{grid-column:1/-1;}
  label{display:block;font-size:12.5px;font-weight:600;color:var(--text-muted);margin-bottom:6px;}
  input,select,textarea{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:7px;font-family:inherit;font-size:13.5px;background:#fff;color:var(--text);}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--primary);outline-offset:1px;border-color:var(--primary);}
  textarea{resize:vertical;min-height:56px;}
  .hint{font-size:11.5px;color:var(--text-muted);margin-top:5px;}
  .computed-box{background:var(--primary-tint);border:1px dashed #9FC6C3;border-radius:7px;padding:9px 11px;font-size:13.5px;font-weight:600;color:var(--primary-dark);}
  .mini-table{width:100%;border-collapse:collapse;margin-top:8px;}
  .mini-table td{padding:5px 4px;border:none;vertical-align:top;}
  .mini-table input,.mini-table select{font-size:12.5px;padding:7px 9px;}
  .row-remove{background:var(--danger-bg);color:var(--danger);border:none;border-radius:6px;width:30px;height:30px;cursor:pointer;font-size:13px;}
  .add-row-btn{margin-top:6px;background:none;border:1px dashed #9FC6C3;color:var(--primary-dark);padding:8px 14px;border-radius:7px;cursor:pointer;font-size:12.5px;font-weight:600;width:100%;}
  .add-row-btn:hover{background:var(--primary-tint);}
  .drawer-footer{position:sticky;bottom:0;background:var(--surface);border-top:1px solid var(--border);padding:14px 24px;display:flex;justify-content:flex-end;gap:10px;}
  .badge-status{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:0.2px;white-space:nowrap;}
  .st-acc{background:var(--success-bg);color:var(--success);}
  .st-wait{background:var(--warn-bg);color:var(--warn);}
  .st-reject{background:var(--danger-bg);color:var(--danger);}
  .st-none{background:#EEF2F2;color:var(--text-muted);}
  .actions-cell{display:flex;gap:6px;}
  .icon-btn{border:none;background:var(--primary-tint);color:var(--primary-dark);width:30px;height:30px;border-radius:7px;cursor:pointer;font-size:13px;}
  .icon-btn.danger{background:var(--danger-bg);color:var(--danger);}
  .icon-btn:hover{filter:brightness(0.95);}
  .login-wrap{max-width:400px;margin:60px auto;background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);padding:34px 30px;text-align:center;}
  .stamp{width:64px;height:64px;border-radius:50%;border:3px solid var(--accent);color:var(--accent);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:11px;line-height:1.2;transform:rotate(-8deg);}
  .login-wrap h2{margin:0 0 6px;font-size:17px;}
  .login-wrap p{margin:0 0 20px;color:var(--text-muted);font-size:13px;}
  .login-wrap input{margin-bottom:12px;text-align:center;letter-spacing:2px;}
  .login-error{color:var(--danger);font-size:12.5px;margin:-4px 0 12px;}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
  .toast{position:fixed;bottom:24px;right:24px;background:var(--primary-dark);color:#fff;padding:12px 18px;border-radius:9px;font-size:13px;box-shadow:var(--shadow);z-index:100;animation:fadeIn .2s ease;}
  .loading-row{padding:40px;text-align:center;color:var(--text-muted);font-size:13px;}
  .footer-note{padding:16px 28px;color:var(--text-muted);font-size:11.5px;text-align:center;}
  .chip{display:inline-flex;align-items:center;gap:6px;background:var(--primary-tint);color:var(--primary-dark);padding:5px 10px;border-radius:20px;font-size:12.5px;margin:3px 5px 3px 0;}
  .chip button{border:none;background:none;color:var(--primary-dark);cursor:pointer;font-size:12px;padding:0;line-height:1;}
  .chip button:hover{color:var(--danger);}
  .cat-group{margin-bottom:22px;}
  .cat-group h4{margin:0 0 8px;font-size:13px;color:var(--text);}
  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  .detail-item{padding:14px 16px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);}
  .detail-item:nth-child(2n){border-right:none;}
  .detail-item .lbl{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:4px;}
  .detail-item .val{font-size:14px;font-weight:600;}
  .detail-item .val.empty{color:var(--text-muted);font-weight:400;font-style:italic;}
  .radio-row{display:flex;gap:18px;flex-wrap:wrap;margin-top:6px;}
  .radio-row label{display:flex;align-items:center;gap:7px;font-weight:600;font-size:13px;color:var(--text);cursor:pointer;}
  .radio-row input{width:auto;}
  @media (max-width:720px){
    .grid,.grid3,.detail-grid{grid-template-columns:1fr;}
    .detail-item{border-right:none !important;}
    main{padding:16px;}
    .topbar{padding:14px;}
  }
  @media print{
    body *{visibility:hidden;}
    #printArea, #printArea *{visibility:visible;}
    #printArea{position:absolute;left:0;top:0;width:100%;}
  }
</style>

<body>
<div id="app"></div>
<script>
(function(){
  "use strict";

  const DEFAULT_TAHAPAN = ['Validasi Proses 1','Validasi Proses 2','Validasi Proses 3','Validasi Proses 4','Validasi Proses 5','Validasi Proses 6'];

  const DYNAMIC_TABLES = [
    { key:'formula', title:'Formula', columns:[
      {field:'kodeBahanBaku', label:'Kode Bahan Baku', type:'externalBahanBaku'},
      {field:'konsentrasiPercent', label:'Konsentrasi (%)', type:'text'},
      {field:'jumlahG', label:'Jumlah (kg)', type:'text'},
    ]},
    { key:'spesifikasiBahanBaku', title:'Spesifikasi Bahan Baku', columns:[
      {field:'kodeBahan', label:'Kode Bahan', type:'externalBahanBaku'},
      {field:'namaDagang', label:'Nama Dagang', type:'text'},
      {field:'namaProdusen', label:'Nama Produsen', type:'text'},
      {field:'namaSupplier', label:'Nama Supplier', type:'text'},
      {field:'noDokumen', label:'Nomor Dokumen', type:'externalBahanBakuDoc'},
    ]},
    { key:'peralatanDetail', title:'Peralatan', columns:[
      {field:'namaAlat', label:'Peralatan', type:'externalInventaris'},
      {field:'nomorInventaris', label:'Nomor Inventaris', type:'text'},
      {field:'tanggalKalibrasi', label:'Tanggal Kalibrasi', type:'externalKalibrasiDate'},
      {field:'tanggalKualifikasi', label:'Tanggal Kualifikasi', type:'text'},
    ]},
    { key:'saranaPenunjang', title:'Sarana Penunjang', columns:[
      {field:'peralatan', label:'Peralatan', type:'externalSaranaPenunjang'},
      {field:'jenisDokumen', label:'Jenis Dokumen', type:'fixedselect', options:['IQ','OQ','PQ']},
      {field:'nomorDokumenReferensi', label:'Nomor Dokumen Referensi', type:'text'},
      {field:'tanggal', label:'Tanggal', type:'date'},
    ]},
    { key:'cpp', title:'CPP — Critical Process Parameter', columns:[
      {field:'namaBahanBaku', label:'Nama Bahan Baku', type:'text'},
      {field:'tahapanProses', label:'Tahapan Proses', type:'select', cat:'cppTahapan'},
      {field:'parameterKritis', label:'Parameter Kritis (CPP)', type:'select', cat:'cppParameter'},
      {field:'targetBatasKendali', label:'Target/Batas Kendali', type:'text'},
      {field:'hasilAktual', label:'Hasil Aktual', type:'text'},
      {field:'status', label:'Status', type:'fixedselect', options:['MS','TMS']},
      {field:'keterangan', label:'Keterangan', type:'text'},
      {field:'pic', label:'PIC', type:'text'},
    ]},
    { key:'pengujianSampling', title:'Pengujian Sampling', columns:[
      {field:'titikSampling', label:'Titik Sampling', type:'text'},
      {field:'keterangan', label:'Keterangan', type:'text'},
      {field:'bobotPengambilan', label:'Bobot Pengambilan (gram)', type:'text'},
      {field:'petugas', label:'Petugas', type:'text'},
      {field:'ipc', label:'IPC', type:'text'},
    ]},
    { key:'cqaTable', title:'CQA — Critical Quality Attribute', columns:[
      {field:'parameterCQA', label:'Parameter CQA', type:'select', cat:'cqaParameter'},
      {field:'spesifikasi', label:'Spesifikasi', type:'text'},
      {field:'hasilAktual', label:'Hasil Aktual', type:'text'},
      {field:'status', label:'Status', type:'fixedselect', options:['MS','TMS']},
      {field:'pic', label:'PIC', type:'text'},
      {field:'keterangan', label:'Keterangan', type:'text'},
    ]},
  ];

  let state = {
    siteLoggedIn: false, siteLoginError: '',
    tab: 'master',
    products: [], lockqa: [],
    categories: { merk:[], namaProduk:[], bentukSediaan:[], batchSize:[], lokasiProduksi:[], peralatan:[], utilitas:[], tahapan:[], kebersihan:[], cppTahapan:[], cppParameter:[], cqaParameter:[], hasilValidasiKriteria:[] },
    loading: true,
    drawerOpen: false, editingProduct: null,
    lockLoggedIn: false, lockLoginError: '', lockDrawerOpen: false, editingLock: null,
    toast: null,
    scriptUrl: '',
    settingsOpen: false, settingsUnlocked: false, settingsPassError: '', revealSecrets: false,
    syncing: false, syncError: '',
    searchQuery: '',
    showArchived: false,
    jadwalKalibrasi: [],
    kalibrasiDept: 'PRD',
    kalibrasiShowArchived: false,
    inventarisMaster: [],
    dataPeralatan: [],
    saranaPenunjangMaster: [],
    peralatanSaranaSubTab: 'peralatan',
    dataPeralatanShowArchived: false,
    saranaPenunjangShowArchived: false,
    categoryModalOpen: false,
    externalLists: { bahanBaku:[], produkRuahan:[], produkJadi:[], dpi:[], ppi:[], cpb:[] },
    detailProductName: '',
  };

  const uid = () => 'p_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);

  function showToast(msg){ state.toast = msg; render(); setTimeout(()=>{ state.toast = null; render(); }, 2600); }

  /* ---------------- SYNC LAYER ---------------- */
  /* Penyimpanan konfigurasi yang bekerja baik di dalam Claude (window.storage)
     maupun saat di-hosting sendiri di luar Claude (GitHub Pages, Netlify, dll)
     dengan fallback ke localStorage biasa. */
  // URL default Apps Script — dipakai kalau belum ada yang tersimpan di browser/perangkat ini.
  // Bisa tetap diganti manual lewat ⚙ Pengaturan kalau suatu saat perlu pindah ke Apps Script lain.
  const DEFAULT_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbymG2i_xn5g4qeOECHm_Zlaos7fkWQKYwukRpnZ_OXnMRXhPpQMer5_hvunCVlMUk-IWg/exec";

  const hasClaudeStorage = (typeof window.storage !== 'undefined' && window.storage && typeof window.storage.get === 'function');

  async function configGet(key){
    if(hasClaudeStorage){
      try{ const r = await window.storage.get(key, true); return r ? r.value : ''; }catch(e){ return ''; }
    }
    try{ return localStorage.getItem(key) || ''; }catch(e){ return ''; }
  }

  async function configSet(key, value){
    if(hasClaudeStorage){
      try{ await window.storage.set(key, value, true); return; }catch(e){ /* fall through */ }
    }
    try{ localStorage.setItem(key, value); }catch(e){ /* storage unavailable, ignore */ }
  }

  async function loadScriptUrlConfig(){
    const stored = await configGet('sheets-script-url');
    state.scriptUrl = stored || DEFAULT_SCRIPT_URL;
  }

  async function loadAll(){
    state.loading = true; render();
    await loadScriptUrlConfig();
    if(!state.scriptUrl){ state.loading = false; render(); return; }
    await refreshFromSheet();
    state.loading = false; render();
  }

  async function checkPassword(type, password){
    if(!state.scriptUrl) return null;
    try{
      const res = await fetch(state.scriptUrl, { method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body: JSON.stringify({ action:'checkPassword', type, password }) });
      const json = await res.json();
      if(json && json.ok) return !!json.valid;
      return null;
    }catch(e){ return null; }
  }

  async function refreshFromSheet(){
    if(!state.scriptUrl) return;
    state.syncing = true; state.syncError=''; render();
    try{
      const res = await fetch(state.scriptUrl, { method:'GET' });
      const data = await res.json();
      if(data && data.ok){
        state.products = data.products || [];
        state.lockqa = data.lockqa || [];
        state.jadwalKalibrasi = data.jadwalKalibrasi || [];
        state.dataPeralatan = data.dataPeralatan || [];
        state.saranaPenunjangMaster = data.saranaPenunjangMaster || [];
        state.inventarisMaster = data.inventarisMaster || [];
        const defaults = { merk:[], namaProduk:[], bentukSediaan:[], batchSize:[], lokasiProduksi:[], peralatan:[], utilitas:[], tahapan:[], kebersihan:[], cppTahapan:[], cppParameter:[], cqaParameter:[], hasilValidasiKriteria:[] };
        state.categories = Object.assign(defaults, data.categories || {});
        state.externalLists = Object.assign({ bahanBaku:[], produkRuahan:[], produkJadi:[], dpi:[], ppi:[], cpb:[] }, data.externalLists || {});
      } else {
        state.syncError = (data && data.error) || 'Gagal memuat data dari Sheet.';
      }
    }catch(e){ state.syncError = 'Tidak bisa terhubung ke Google Sheets. Periksa URL Apps Script.'; }
    state.syncing = false; render();
  }

  async function postToSheet(action, data){
    if(!state.scriptUrl){ showToast('Atur URL Apps Script dulu di ⚙ Pengaturan.'); return false; }
    state.syncing = true; render();
    try{
      const res = await fetch(state.scriptUrl, { method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body: JSON.stringify({ action, data }) });
      const json = await res.json();
      state.syncing = false;
      if(!json || !json.ok){ showToast('Gagal sync ke Sheet: ' + ((json&&json.error)||'unknown error')); return false; }
      return true;
    }catch(e){ state.syncing = false; showToast('Gagal terhubung ke Google Sheets.'); return false; }
  }

  async function saveProducts(){ await postToSheet('saveProducts', state.products); }
  async function saveLockQA(){ await postToSheet('saveLockQA', state.lockqa); }
  async function saveJadwalKalibrasi(){ await postToSheet('saveJadwalKalibrasi', state.jadwalKalibrasi); }
  async function saveDataPeralatan(){ await postToSheet('saveDataPeralatan', state.dataPeralatan); }
  async function saveSaranaPenunjangMaster(){ await postToSheet('saveSaranaPenunjangMaster', state.saranaPenunjangMaster); }
  async function saveCategories(){ await postToSheet('saveCategories', state.categories); }
  async function saveScriptConfig(url){
    state.scriptUrl = url.trim();
    try{ await configSet('sheets-script-url', state.scriptUrl); }catch(e){}
    if(state.scriptUrl){ await refreshFromSheet(); }
  }

  /* ---------------- HELPERS ---------------- */
  function emptyRowFor(cfg){ const row={}; cfg.columns.forEach(c=>row[c.field]=''); return row; }

  function todayISO(){
    const d = new Date();
    const pad = n => String(n).padStart(2,'0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  }

  function emptyProduct(){
    const p = {
      id: uid(), _kodeAuto: true, deleted: false,
      tanggalIsi: todayISO(), kode:'', merk:'', namaProduk:'', namaProdukLengkapOverride:'',
      bentukSediaan:'', batchSize:'', lokasiProduksi:'',
      jadwal: [ {tahapan:'Validasi Proses 1', tanggal:'', nomorBatch:''} ],
      keteranganValidasi:'',
      dpi:'', ppi:'', spesifikasiRuahan:'', cpb:'', spesifikasiProdukJadi:'',
      tanggalSampling:'',
      yieldData: {bobotTeoritis:'', bobotAktual:'', selisih:'', rekonsiliasi:'', keterangan:''},
      kondisiRuangan: {
        penimbangan: {suhu:'', rh:'', kebersihanArea:'', kebersihanMesin:'', diperiksaOleh:''},
        pengolahan: {suhu:'', rh:'', kebersihanArea:'', kebersihanMesin:'', diperiksaOleh:''}
      },
      hasilValidasi: {
        cpp: {kriteria:'', hasilAktual:'', status:'', pemeriksa:''},
        cqa: {kriteria:'', hasilAktual:'', status:'', pemeriksa:''},
        yieldRow: {kriteria:'', hasilAktual:'', status:'', pemeriksa:''},
        deviasi: {kriteria:'', hasilAktual:'', status:'', pemeriksa:''}
      },
      evaluasiKesimpulan:'', rekomendasi:'',
      alurProsesTahapan: ['']
    };
    DYNAMIC_TABLES.forEach(cfg=>{ p[cfg.key] = [emptyRowFor(cfg)]; });
    return p;
  }

  function ensureExtraSections(product){
    DYNAMIC_TABLES.forEach(cfg=>{
      if(!Array.isArray(product[cfg.key]) || product[cfg.key].length===0) product[cfg.key] = [emptyRowFor(cfg)];
    });
    if(!Array.isArray(product.alurProsesTahapan) || product.alurProsesTahapan.length===0) product.alurProsesTahapan = [''];
    if(!product.yieldData) product.yieldData = {bobotTeoritis:'', bobotAktual:'', selisih:'', rekonsiliasi:'', keterangan:''};
    if(!product.kondisiRuangan) product.kondisiRuangan = { penimbangan:{suhu:'',rh:'',kebersihanArea:'',kebersihanMesin:'',diperiksaOleh:''}, pengolahan:{suhu:'',rh:'',kebersihanArea:'',kebersihanMesin:'',diperiksaOleh:''} };
    if(!product.hasilValidasi) product.hasilValidasi = {
      cpp:{kriteria:'',hasilAktual:'',status:'',pemeriksa:''}, cqa:{kriteria:'',hasilAktual:'',status:'',pemeriksa:''},
      yieldRow:{kriteria:'',hasilAktual:'',status:'',pemeriksa:''}, deviasi:{kriteria:'',hasilAktual:'',status:'',pemeriksa:''}
    };
    if(product.evaluasiKesimpulan===undefined) product.evaluasiKesimpulan = '';
    if(product.cpb===undefined) product.cpb = '';
    if(product.deleted===undefined) product.deleted = false;
    if(product.spesifikasiProdukJadi===undefined) product.spesifikasiProdukJadi = '';
    if(product.rekomendasi===undefined) product.rekomendasi = '';
  }

  function fullName(p){
    if(p.namaProdukLengkapOverride && p.namaProdukLengkapOverride.trim()) return p.namaProdukLengkapOverride;
    return [p.merk, p.namaProduk].filter(Boolean).join(' ');
  }

  function numberToLetters(n){ let s=''; while(n>0){ n--; s=String.fromCharCode(65+(n%26))+s; n=Math.floor(n/26);} return s; }

  function computeAutoKode(namaProduk, excludeId){
    const key = String(namaProduk||'').trim().toLowerCase();
    if(!key) return '';
    const relevant = state.products.filter(p => p.id !== excludeId);
    const order = [];
    relevant.forEach(p=>{ const k = String(p.namaProduk||'').trim().toLowerCase(); if(k && !order.includes(k)) order.push(k); });
    let idx = order.indexOf(key); let isNewGroup = false;
    if(idx === -1){ idx = order.length; isNewGroup = true; }
    const letter = numberToLetters(idx + 1);
    const countInGroup = relevant.filter(p => String(p.namaProduk||'').trim().toLowerCase() === key).length;
    const number = isNewGroup ? 1 : countInGroup + 1;
    return letter + number;
  }

  function tahapanOptions(){ return (state.categories.tahapan && state.categories.tahapan.length) ? state.categories.tahapan : DEFAULT_TAHAPAN; }

  function syncJadwalWithTahapanOptions(product){
    const opts = tahapanOptions();
    const existing = product.jadwal || [];
    product.jadwal = opts.map(t => {
      const found = existing.find(j => String(j.tahapan||'').trim().toLowerCase() === t.trim().toLowerCase());
      return { tahapan: t, tanggal: found ? found.tanggal : '', nomorBatch: found ? (found.nomorBatch||'') : '' };
    });
  }

  function lockStatusFor(productId){
    const related = state.lockqa.filter(r => r.kodeId === productId);
    if(related.length === 0) return { label:'Belum ada pengajuan', cls:'st-none', related };
    const hasAcc = related.some(r=>r.status==='Acc Supervisor QA');
    const hasReject = related.some(r=>r.status==='Ditolak');
    if(hasAcc) return { label:'Acc Supervisor QA', cls:'st-acc', related };
    if(hasReject && related.every(r=>r.status==='Ditolak')) return { label:'Ditolak', cls:'st-reject', related };
    return { label:'Menunggu', cls:'st-wait', related };
  }

  function matchesSearch(p, q){
    if(!q) return true;
    const hay = [p.kode, p.merk, p.namaProduk, fullName(p), p.batchSize, p.lokasiProduksi, p.dpi, p.ppi, p.spesifikasiRuahan, p.keteranganValidasi, p.bentukSediaan].join(' ').toLowerCase();
    return hay.includes(q.toLowerCase());
  }

  function escapeHtml(str){ return String(str==null?'':str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function escAttr(str){ return escapeHtml(str); }

  function getNested(obj, path){ return path.split('.').reduce((o,k)=> (o==null?o:o[k]), obj); }
  function setNested(obj, path, val){
    const parts = path.split('.'); let o = obj;
    for(let i=0;i<parts.length-1;i++){ o = o[parts[i]]; }
    o[parts[parts.length-1]] = val;
  }

  const CATEGORY_USAGE = {
    merk: [{ path:'merk' }],
    namaProduk: [{ path:'namaProduk' }],
    bentukSediaan: [{ path:'bentukSediaan' }],
    batchSize: [{ path:'batchSize' }],
    lokasiProduksi: [{ path:'lokasiProduksi' }],
    peralatan: [{ table:'peralatanDetail', field:'namaAlat' }],
    utilitas: [{ table:'saranaPenunjang', field:'peralatan' }],
    tahapan: [{ table:'jadwal', field:'tahapan' }],
    cppTahapan: [{ table:'cpp', field:'tahapanProses' }],
    cppParameter: [{ table:'cpp', field:'parameterKritis' }],
    cqaParameter: [{ table:'cqaTable', field:'parameterCQA' }],
  };

  function cascadeCategoryRename(type, oldValue, newValue){
    const usages = CATEGORY_USAGE[type] || [];
    let changed = false;
    state.products.forEach(p=>{
      usages.forEach(u=>{
        if(u.path){
          if(p[u.path] === oldValue){ p[u.path] = newValue; changed = true; }
        } else if(u.table){
          (p[u.table]||[]).forEach(row=>{
            if(row[u.field] === oldValue){ row[u.field] = newValue; changed = true; }
          });
        }
      });
    });
    return changed;
  }

      const seen = new Set();
      const opts = (state.inventarisMaster||[]).filter(item=>{

      }).map(item=>`<option value="${escAttr(item.namaInventaris)}">${escapeHtml(item.nomorInventaris)}</option>`).join('');

      }).map(item=>`<option value="${escAttr(item.namaSarana)}"></option>`).join('');

    const row = state.editingProduct.saranaPenunjang[idx];
    if(!row || !row.peralatan || !row.jenisDokumen) return;
    const match = (state.saranaPenunjangMaster||[]).find(m=>!m.deleted && m.namaSarana===row.peralatan && m.jenisDokumen===row.jenisDokumen);
    if(match){
      row.nomorDokumenReferensi = match.nomorDokumenReferensi || '';
      row.tanggal = match.tanggal || '';
      render();
    }

  function findPreviousProductWithData(namaProduk, excludeId, tableKey){
    const key = String(namaProduk||'').trim().toLowerCase();
    if(!key) return null;
    const matches = state.products.filter(p =>
      p.id !== excludeId && !p.deleted &&
      String(p.namaProduk||'').trim().toLowerCase() === key &&
      (p[tableKey]||[]).some(row => Object.values(row).some(v=>v))
    );
    return matches.length ? matches[matches.length-1] : null;
  }

  function ensureSpesifikasiBahanBakuRow(kode){
    if(!kode) return;
    const list = state.editingProduct.spesifikasiBahanBaku;
    const alreadyExists = list.some(r => r.kodeBahan === kode);
    if(alreadyExists) return;
    const match = (state.externalLists.bahanBaku||[]).find(i=>i.kode===kode);
    const newRow = {
      kodeBahan: kode,
      namaDagang: match ? (match.nama||'') : '',
      namaProdusen: match ? (match.produsen||'') : '',
      namaSupplier: match ? (match.pemasok||'') : '',
      noDokumen: ''
    };
    // buang baris kosong placeholder pertama kalau masih benar-benar kosong
    if(list.length===1 && !list[0].kodeBahan && !list[0].namaDagang && !list[0].namaProdusen && !list[0].namaSupplier && !list[0].noDokumen){
      list.splice(0,1);
    }
    list.push(newRow);
  }

  function computeFormulaTotals(rows){
    let totalPercent = 0, totalGram = 0;
    (rows||[]).forEach(r=>{
      const pct = parseFloat(r.konsentrasiPercent);
      const g = parseFloat(r.jumlahG);
      if(!isNaN(pct)) totalPercent += pct;
      if(!isNaN(g)) totalGram += g;
    });
    return { totalPercent, totalGram };
  }

  function formatDateID(isoStr){
    if(!isoStr) return '';
    const m = String(isoStr).match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if(!m) return isoStr;
    return `${m[3]}-${m[2]}-${m[1]}`;
  }

  function formatNum(n){
    return (Math.round(n * 100) / 100).toString();

  function moveRowButtonsHtml(action, extraAttrs, idx, len){
    const upDisabled = idx === 0 ? 'disabled' : '';

    const tmp = arr[idx];
    arr[idx] = arr[newIdx];

  function escapeSvgText(s){ const t = String(s).length>36 ? String(s).slice(0,35)+'…' : String(s); return escapeHtml(t); }

  function buildFlowchartSVG(steps){
    const valid = (steps||[]).filter(s=>s && s.trim());
    if(valid.length===0) return `<div class="hint">Belum ada tahapan diisi.</div>`;
    const boxW=300, boxH=54, gapY=34, padX=16, padY=16;
    const totalH = valid.length*boxH + (valid.length-1)*gapY + padY*2;
    const totalW = boxW + padX*2;
    let svg = `<svg viewBox="0 0 ${totalW} ${totalH}" width="100%" style="max-width:440px;display:block" xmlns="http://www.w3.org/2000/svg">`;
    svg += `<defs><marker id="flowArrow" markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#0F5C5C"/></marker></defs>`;
    valid.forEach((step,i)=>{
      const y = padY + i*(boxH+gapY);
      svg += `<rect x="${padX}" y="${y}" width="${boxW}" height="${boxH}" rx="10" fill="#E4EFEE" stroke="#0F5C5C" stroke-width="1.5"/>`;
      svg += `<text x="${padX+boxW/2}" y="${y+boxH/2+5}" text-anchor="middle" font-size="13" font-family="IBM Plex Sans, sans-serif" fill="#0A4141">${escapeSvgText(step)}</text>`;
      if(i < valid.length-1){
        const x = padX+boxW/2;
        svg += `<line x1="${x}" y1="${y+boxH}" x2="${x}" y2="${y+boxH+gapY-2}" stroke="#0F5C5C" stroke-width="2" marker-end="url(#flowArrow)"/>`;
      }
    });
    svg += `</svg>`;
    return svg;
  }

  function renderFixedFieldsGroup(title, basePath, product, fields){
    const inputs = fields.map(f=>{
      const path = basePath + '.' + f.field;
      const val = getNested(product, path) || '';
      if(f.type === 'select'){
        return `<div class="field"><label>${f.label}</label><select data-nested="${path}" data-cat="${f.cat}">${optionsHtml(state.categories[f.cat], val)}</select></div>`;
      }
      return `<div class="field"><label>${f.label}</label><input type="text" data-nested="${path}" value="${escAttr(val)}"></div>`;
    }).join('');
    return `<div style="margin-bottom:16px"><div style="font-weight:600;font-size:13px;margin-bottom:8px">${title}</div><div class="grid3">${inputs}</div></div>`;
  }

     EXPORT KE WORD (.docx) & PDF (cetak browser)
     ============================================================ */
  function buildReportSections(p){
    const rowsFrom = (list, cfg) => (list||[]).filter(r=>cfg.columns.some(c=>r[c.field]))
      .map((r,i)=>[String(i+1)].concat(cfg.columns.map(c=>c.type==='date' ? formatDateID(r[c.field]) : (r[c.field]||''))));

    const cfgFormula = DYNAMIC_TABLES[0], cfgSpes = DYNAMIC_TABLES[1], cfgPeralatan = DYNAMIC_TABLES[2],
      cfgSarana = DYNAMIC_TABLES[3], cfgCpp = DYNAMIC_TABLES[4], cfgSampling = DYNAMIC_TABLES[5], cfgCqa = DYNAMIC_TABLES[6];

    const kr = p.kondisiRuangan || {penimbangan:{},pengolahan:{}};
    const y = p.yieldData || {};
    const hv = p.hasilValidasi || {};

    return {
      header: {
        namaProduk: fullName(p), bentukSediaan: p.bentukSediaan,
        batchSize: p.batchSize, lokasi: p.lokasiProduksi
      },
      A: { title:'Formula', headers:['No.','Kode Bahan Baku','Konsentrasi (%)','Jumlah (kg)'], rows: rowsFrom(p.formula, cfgFormula), totals: computeFormulaTotals(p.formula) },
      B: { title:'Spesifikasi Bahan Baku', headers:['No.','Kode Bahan','Nama Dagang','Nama Produsen','Nama Supplier','Nomor Dokumen'], rows: rowsFrom(p.spesifikasiBahanBaku, cfgSpes) },
      C: { title:'Peralatan', headers:['No.','Peralatan','Nomor Inventaris','Tanggal Kalibrasi','Tanggal Kualifikasi'], rows: rowsFrom(p.peralatanDetail, cfgPeralatan) },
      D: { title:'Sarana Penunjang', headers:['No.','Peralatan','Jenis Dokumen','Nomor Dokumen Referensi','Tanggal'], rows: rowsFrom(p.saranaPenunjang, cfgSarana) },
      E: { title:'Kondisi Ruangan', headers:['Ruangan','Suhu Ruangan (15-25 °C)','Kelembaban/RH (45-65%)','Kebersihan Area','Kebersihan Mesin','Diperiksa Oleh'],
        rows:[
          ['Penimbangan', kr.penimbangan.suhu||'', kr.penimbangan.rh||'', kr.penimbangan.kebersihanArea||'', kr.penimbangan.kebersihanMesin||'', kr.penimbangan.diperiksaOleh||''],
          ['Pengolahan', kr.pengolahan.suhu||'', kr.pengolahan.rh||'', kr.pengolahan.kebersihanArea||'', kr.pengolahan.kebersihanMesin||'', kr.pengolahan.diperiksaOleh||''],
        ] },
      F: { title:'Bagan Alur Proses', steps: (p.alurProsesTahapan||[]).filter(s=>s&&s.trim()) },
      G: { title:'Critical Process Parameter (CPP)', headers:['No.','Nama Bahan Baku','Tahapan Proses','Parameter Kritis (CPP)','Target/Batas Kendali','Hasil Aktual','Status','Keterangan','PIC'], rows: rowsFrom(p.cpp, cfgCpp) },
      H: { title:'Pengujian Sampling', tanggalSampling: formatDateID(p.tanggalSampling), headers:['No.','Titik Sampling','Keterangan','Bobot Pengambilan (gram)','Petugas','IPC'], rows: rowsFrom(p.pengujianSampling, cfgSampling) },
      I: { title:'Critical Quality Atribute (CQA)', headers:['No.','Parameter CQA','Spesifikasi','Hasil Aktual','Status','PIC','Keterangan'], rows: rowsFrom(p.cqaTable, cfgCqa) },
      J: { title:'Perhitungan Yield', headers:['Parameter','Hasil','Keterangan'],
        rows:[
          ['Bobot Teoritis (kg)', y.bobotTeoritis||'', ''],
          ['Bobot Aktual (kg)', y.bobotAktual||'', ''],
          ['Selisih', y.selisih||'', ''],
          ['Rekonsiliasi (%)', y.rekonsiliasi||'', y.keterangan||''],
        ] },
      K: { title:'Hasil Validasi Proses', headers:['Parameter','Kriteria','Hasil Aktual','Status','Pemeriksa'],
        rows:[
          ['CPP', hv.cpp.kriteria||'', hv.cpp.hasilAktual||'', hv.cpp.status||'', hv.cpp.pemeriksa||''],
          ['CQA', hv.cqa.kriteria||'', hv.cqa.hasilAktual||'', hv.cqa.status||'', hv.cqa.pemeriksa||''],
          ['Yield', hv.yieldRow.kriteria||'', hv.yieldRow.hasilAktual||'', hv.yieldRow.status||'', hv.yieldRow.pemeriksa||''],
          ['Deviasi', hv.deviasi.kriteria||'', hv.deviasi.hasilAktual||'', hv.deviasi.status||'', hv.deviasi.pemeriksa||''],
        ] },
      evaluasiKesimpulan: p.evaluasiKesimpulan || '',
      rekomendasi: p.rekomendasi || '',
      kode: p.kode, keteranganValidasi: p.keteranganValidasi || ''
    };
  }

  /* ---- Word (.docx) ---- */
  function escapeXml(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&apos;'); }

  function docxPara(text, opts){
    opts = opts || {};
    const bold = opts.bold ? '<w:b/>' : '';
    const sz = `<w:sz w:val="${opts.size || 24}"/><w:szCs w:val="${opts.size || 24}"/>`;
    const font = `<w:rFonts w:ascii="Times New Roman" w:hAnsi="Times New Roman" w:cs="Times New Roman"/>`;
    const align = opts.align ? `<w:jc w:val="${opts.align}"/>` : '';
    const spacing = `<w:spacing w:before="${opts.before||60}" w:after="${opts.after||60}"/>`;
    return `<w:p><w:pPr>${spacing}${align}</w:pPr><w:r><w:rPr>${font}${bold}${sz}</w:rPr><w:t xml:space="preserve">${escapeXml(text)}</w:t></w:r></w:p>`;
  }

  function docxCell(text, opts){
    opts = opts || {};
    const span = opts.colSpan && opts.colSpan > 1 ? `<w:gridSpan w:val="${opts.colSpan}"/>` : '';
    return `<w:tc><w:tcPr><w:tcW w:w="${opts.width||1500}" w:type="dxa"/>${span}${opts.shade?`<w:shd w:val="clear" w:fill="E4EFEE"/>`:''}</w:tcPr>${docxPara(text,{bold:opts.bold, size:24, before:20, after:20})}</w:tc>`;
  }

  function docxInfoTable(pairs){
    const labelWidth = 2600, valWidth = 6750;
    const noBorders = `<w:tblBorders>
      <w:top w:val="none"/><w:left w:val="none"/><w:bottom w:val="none"/><w:right w:val="none"/>
      <w:insideH w:val="none"/><w:insideV w:val="none"/>
    </w:tblBorders>`;
    let xml = `<w:tbl><w:tblPr><w:tblW w:w="${labelWidth+valWidth}" w:type="dxa"/>${noBorders}</w:tblPr><w:tblGrid><w:gridCol w:w="${labelWidth}"/><w:gridCol w:w="${valWidth}"/></w:tblGrid>`;
    pairs.forEach(([label, value])=>{
      xml += `<w:tr>
        <w:tc><w:tcPr><w:tcW w:w="${labelWidth}" w:type="dxa"/></w:tcPr>${docxPara(label, {size:24, before:20, after:20})}</w:tc>
        <w:tc><w:tcPr><w:tcW w:w="${valWidth}" w:type="dxa"/></w:tcPr>${docxPara(': ' + (value||''), {size:24, before:20, after:20})}</w:tc>
      </w:tr>`;
    });
    xml += `</w:tbl>`;
    return xml;
  }

  function docxFlowBox(text){
    const width = 6000;
    const borders = `<w:tblBorders>
      <w:top w:val="single" w:sz="8" w:color="0F5C5C"/><w:left w:val="single" w:sz="8" w:color="0F5C5C"/>
      <w:bottom w:val="single" w:sz="8" w:color="0F5C5C"/><w:right w:val="single" w:sz="8" w:color="0F5C5C"/>
    </w:tblBorders>`;
    return `<w:tbl><w:tblPr><w:tblW w:w="${width}" w:type="dxa"/><w:jc w:val="center"/>${borders}</w:tblPr><w:tblGrid><w:gridCol w:w="${width}"/></w:tblGrid>
      <w:tr><w:tc><w:tcPr><w:tcW w:w="${width}" w:type="dxa"/><w:shd w:val="clear" w:fill="E4EFEE"/><w:vAlign w:val="center"/></w:tcPr>
        ${docxPara(text, {align:'center', size:24, before:80, after:80})}
      </w:tc></w:tr>
    </w:tbl>`;
  }

  function docxFlowArrow(){
    return docxPara('↓', {align:'center', size:28, before:20, after:20});
  }

  function docxTable(headers, rows, boldRowIndexes){
    boldRowIndexes = boldRowIndexes || [];
    const totalWidth = 9350;
    const colW = Math.floor(totalWidth/headers.length);
    const borders = `<w:tblBorders>
      <w:top w:val="single" w:sz="4" w:color="000000"/><w:left w:val="single" w:sz="4" w:color="000000"/>
      <w:bottom w:val="single" w:sz="4" w:color="000000"/><w:right w:val="single" w:sz="4" w:color="000000"/>
      <w:insideH w:val="single" w:sz="4" w:color="000000"/><w:insideV w:val="single" w:sz="4" w:color="000000"/>
    </w:tblBorders>`;
    let xml = `<w:tbl><w:tblPr><w:tblW w:w="${totalWidth}" w:type="dxa"/>${borders}</w:tblPr><w:tblGrid>${headers.map(()=>`<w:gridCol w:w="${colW}"/>`).join('')}</w:tblGrid>`;
    xml += `<w:tr>${headers.map(h=>docxCell(h,{bold:true, width:colW, shade:true})).join('')}</w:tr>`;
    if(rows.length===0){
      xml += `<w:tr>${headers.map((h,i)=>docxCell(i===0?'Belum ada data':'', {width:colW})).join('')}</w:tr>`;
    } else {
      rows.forEach((row,ri)=>{
        const isBold = boldRowIndexes.includes(ri);
        if(row.length < headers.length){
          const span = headers.length - row.length + 1;
          const cells = [docxCell(row[0], {width:colW*span, bold:isBold, colSpan:span})]
            .concat(row.slice(1).map(c=>docxCell(c, {width:colW, bold:isBold})));
          xml += `<w:tr>${cells.join('')}</w:tr>`;
        } else {
          xml += `<w:tr>${row.map((c,i)=>docxCell(c, {width:colW, bold:isBold})).join('')}</w:tr>`;
        }
      });
    }
    xml += `</w:tbl>`;
    return xml;
  }

  const LOGO_WIDTH_EMU = 1714500;
  const LOGO_HEIGHT_EMU = 457200;

  function buildDocxLogoXml(){
    return `<w:p><w:pPr><w:jc w:val="left"/></w:pPr><w:r><w:drawing>
      <wp:inline distT="0" distB="0" distL="0" distR="0" xmlns:wp="http://schemas.openxmlformats.org/drawingml/2006/wordprocessingDrawing">
        <wp:extent cx="${LOGO_WIDTH_EMU}" cy="${LOGO_HEIGHT_EMU}"/>
        <wp:effectExtent l="0" t="0" r="0" b="0"/>
        <wp:docPr id="1" name="Logo"/>
        <wp:cNvGraphicFramePr><a:graphicFrameLocks xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" noChangeAspect="1"/></wp:cNvGraphicFramePr>
        <a:graphic xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main">
          <a:graphicData uri="http://schemas.openxmlformats.org/drawingml/2006/picture">
            <pic:pic xmlns:pic="http://schemas.openxmlformats.org/drawingml/2006/picture">
              <pic:nvPicPr><pic:cNvPr id="0" name="Logo"/><pic:cNvPicPr/></pic:nvPicPr>
              <pic:blipFill>
                <a:blip r:embed="rIdLogo" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"/>
                <a:stretch><a:fillRect/></a:stretch>
              </pic:blipFill>
              <pic:spPr>
                <a:xfrm><a:off x="0" y="0"/><a:ext cx="${LOGO_WIDTH_EMU}" cy="${LOGO_HEIGHT_EMU}"/></a:xfrm>
                <a:prstGeom prst="rect"><a:avLst/></a:prstGeom>
              </pic:spPr>
            </pic:pic>
          </a:graphicData>
        </a:graphic>
      </wp:inline>
    </w:drawing></w:r></w:p>`;
  }

  function buildDocxBodyXml(sections){
    let body = '';
    body += buildDocxLogoXml();
    body += docxPara('LAPORAN VALIDASI PROSES', {bold:true, size:28, align:'center', before:60, after:200});
    body += docxInfoTable([
      ['Nama Produk', sections.header.namaProduk],
      ['Bentuk Sediaan', sections.header.bentukSediaan],
      ['Batch Size', sections.header.batchSize],
      ['Lokasi', sections.header.lokasi],
    ]);
    body += docxPara('', {before:0, after:120});

    ['A','B','C','D'].forEach(k=>{
      const s = sections[k];
      body += docxPara(k + '. ' + s.title, {bold:true, size:24, before:200});
      let rowsToShow = s.rows;
      if(k === 'A' && s.totals){
        rowsToShow = s.rows.concat([['TOTAL', formatNum(s.totals.totalPercent), formatNum(s.totals.totalGram)]]);
      }
      body += docxTable(s.headers, rowsToShow, k==='A' ? [s.rows.length] : []);
    });

    const eSec = sections.E;
    body += docxPara('E. ' + eSec.title, {bold:true, size:24, before:200});
    body += docxTable(eSec.headers, eSec.rows);

    body += docxPara('F. ' + sections.F.title, {bold:true, size:24, before:200});
    if(sections.F.steps.length===0){
      body += docxPara('Belum ada tahapan diisi.', {size:24});
    } else {
      sections.F.steps.forEach((step,i)=>{
        body += docxFlowBox(step);
        if(i < sections.F.steps.length-1) body += docxFlowArrow();
      });
    }
    body += docxPara('', {before:0, after:100});

    ['G'].forEach(k=>{
      const s = sections[k];
      body += docxPara(k + '. ' + s.title, {bold:true, size:24, before:200});
      body += docxTable(s.headers, s.rows);
    });

    const hSec = sections.H;
    body += docxPara('H. ' + hSec.title, {bold:true, size:24, before:200});
    body += docxInfoTable([
      ['Nama Produk', sections.header.namaProduk],
      ['Tanggal Sampling', hSec.tanggalSampling||''],
    ]);
    body += docxTable(hSec.headers, hSec.rows);

    ['I','J','K'].forEach(k=>{
      const s = sections[k];
      body += docxPara(k + '. ' + s.title, {bold:true, size:24, before:200});
      body += docxTable(s.headers, s.rows);
    });

    body += docxPara('Evaluasi dan Kesimpulan:', {bold:true, size:24, before:200});
    ['Validasi Diterima','Validasi Ditolak','Revalidasi'].forEach(opt=>{
      body += docxPara((sections.evaluasiKesimpulan===opt?'☑ ':'☐ ') + opt, {size:24});
    });
    body += docxPara('Rekomendasi:', {bold:true, size:24, before:200});
    body += docxPara(sections.rekomendasi || '-', {size:24});

    return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>

  async function downloadDocx(p){
    if(typeof JSZip === 'undefined'){ showToast('Gagal memuat pustaka Word (JSZip). Periksa koneksi internet.'); return; }
    const sections = buildReportSections(p);
    const documentXml = buildDocxBodyXml(sections);
    const zip = new JSZip();
    zip.file('[Content_Types].xml', DOCX_CONTENT_TYPES);
    zip.folder('_rels').file('.rels', DOCX_RELS);
    zip.folder('docProps').file('core.xml', DOCX_CORE);
    zip.file('docProps/app.xml', DOCX_APP);
    const wordFolder = zip.folder('word');
    wordFolder.file('document.xml', documentXml);
    wordFolder.file('styles.xml', DOCX_STYLES);
    wordFolder.folder('_rels').file('document.xml.rels', DOCX_DOCUMENT_RELS);
    wordFolder.folder('media').file('logo.png', LOGO_BASE64, {base64:true});
    const blob = await zip.generateAsync({type:'blob'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'Laporan Validasi Proses - ' + (p.kode||'produk') + '.docx';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  /* ---- PDF (cetak browser) ---- */
  function htmlInfoTable(pairs){
    const rows = pairs.map(([label,value])=>`<tr><td style="border:none;padding:2px 10px 2px 0;width:170px;vertical-align:top">${escapeHtml(label)}</td><td style="border:none;padding:2px 0;vertical-align:top">: ${escapeHtml(value||'')}</td></tr>`).join('');
    return `<table style="border-collapse:collapse;margin-bottom:8px">${rows}</table>`;
  }

  function htmlTable(headers, rows, boldRowIndexes){
    boldRowIndexes = boldRowIndexes || [];
    const th = headers.map(h=>`<th>${escapeHtml(h)}</th>`).join('');
    const trs = rows.length ? rows.map((r,ri)=>{
      const style = boldRowIndexes.includes(ri) ? ' style="font-weight:bold"' : '';
      if(r.length < headers.length){
        const span = headers.length - r.length + 1;
        const cells = [`<td colspan="${span}">${escapeHtml(r[0])}</td>`].concat(r.slice(1).map(c=>`<td>${escapeHtml(c)}</td>`));
        return `<tr${style}>${cells.join('')}</tr>`;
      }
      return `<tr${style}>${r.map(c=>`<td>${escapeHtml(c)}</td>`).join('')}</tr>`;
    }).join('') : `<tr><td colspan="${headers.length}" style="color:#888">Belum ada data</td></tr>`;
    return `<table style="width:100%;border-collapse:collapse;margin:8px 0 16px;font-size:11px"><thead><tr>${th}</tr></thead><tbody>${trs}</tbody></table>`;
  }

  function buildPrintHtml(p){
    const s = buildReportSections(p);
    let body = `
      <img src="data:image/png;base64,${LOGO_BASE64}" style="height:40px;display:block;margin-bottom:8px" alt="Logo">
      <h1 style="text-align:center;font-size:18px">LAPORAN VALIDASI PROSES</h1>
      ${htmlInfoTable([
        ['Nama Produk', s.header.namaProduk],
        ['Bentuk Sediaan', s.header.bentukSediaan],
        ['Batch Size', s.header.batchSize],
        ['Lokasi', s.header.lokasi],
      ])}
    `;
    ['A','B','C','D'].forEach(k=>{
      let rowsToShow = s[k].rows;
      let boldRows = [];
      if(k === 'A' && s[k].totals){
        rowsToShow = s[k].rows.concat([['TOTAL', formatNum(s[k].totals.totalPercent), formatNum(s[k].totals.totalGram)]]);
        boldRows = [s[k].rows.length];
      }
      body += `<h3>${k}. ${escapeHtml(s[k].title)}</h3>` + htmlTable(s[k].headers, rowsToShow, boldRows);
    });
    body += `<h3>E. ${escapeHtml(s.E.title)}</h3>` + htmlTable(s.E.headers, s.E.rows);
    body += `<h3>F. ${escapeHtml(s.F.title)}</h3>`;
    if(s.F.steps.length===0){ body += `<p style="color:#888">Belum ada tahapan diisi.</p>`; }
    else { body += s.F.steps.map((step,i)=>`<div style="border:2px solid #0F5C5C;background:#E4EFEE;border-radius:6px;padding:8px 14px;max-width:400px;margin:0 auto;text-align:center;font-weight:bold">${escapeHtml(step)}</div>${i<s.F.steps.length-1?'<div style="text-align:center;font-size:18px;line-height:1.2">↓</div>':''}`).join(''); }
    body += `<h3>G. ${escapeHtml(s.G.title)}</h3>` + htmlTable(s.G.headers, s.G.rows);
    body += `<h3>H. ${escapeHtml(s.H.title)}</h3>` + htmlInfoTable([['Nama Produk', s.header.namaProduk],['Tanggal Sampling', s.H.tanggalSampling||'']]) + htmlTable(s.H.headers, s.H.rows);
    body += `<h3>I. ${escapeHtml(s.I.title)}</h3>` + htmlTable(s.I.headers, s.I.rows);
    body += `<h3>J. ${escapeHtml(s.J.title)}</h3>` + htmlTable(s.J.headers, s.J.rows);
    body += `<h3>K. ${escapeHtml(s.K.title)}</h3>` + htmlTable(s.K.headers, s.K.rows);
    body += `<h3>Evaluasi dan Kesimpulan:</h3>`;
    ['Validasi Diterima','Validasi Ditolak','Revalidasi'].forEach(opt=>{
      body += `<p>${s.evaluasiKesimpulan===opt?'☑':'☐'} ${opt}</p>`;
    });
    body += `<h3>Rekomendasi:</h3><p>${escapeHtml(s.rekomendasi||'-')}</p>`;

    return `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Laporan Validasi Proses - ${escapeHtml(p.kode||'')}</title>
    <style>
      body{font-family:'Times New Roman',Times,serif;font-size:12pt;color:#111;padding:24px;}
      h1{margin:14px 0 6px;font-size:14pt;}
      h3{margin:14px 0 6px;font-size:12pt;}
      table{border:1px solid #333;font-size:12pt;}
      th,td{border:1px solid #333;padding:4px 6px;text-align:left;vertical-align:top;}
      th{background:#eee;}
      p{font-size:12pt;}
      @media print{ body{padding:0;} }
    </style></head><body>${body}
    <script>window.onload=function(){ setTimeout(function(){ window.print(); }, 300); };<\/script>
    </body></html>`;
  }

  function render(){
    const _sy = window.scrollY;
    const app = document.getElementById('app');
    if(!state.siteLoggedIn){ app.innerHTML = renderSiteLogin(); attachSiteLoginEvents(); return; }
    app.innerHTML = `
      ${topbar()}

      ${state.categoryModalOpen ? renderCategoryModal() : ''}
      ${state.toast ? `<div class="toast">${escapeHtml(state.toast)}</div>` : ''}
    `;
    attachEvents();
    // Restore scroll position — use multiple frames to beat browser's auto-scroll
    if(_sy > 0){
      window.scrollTo({top:_sy, behavior:'instant'});
      requestAnimationFrame(()=>{
        window.scrollTo({top:_sy, behavior:'instant'});
        requestAnimationFrame(()=>{ window.scrollTo({top:_sy, behavior:'instant'}); });
      });
      setTimeout(()=>{ window.scrollTo({top:_sy, behavior:'instant'}); }, 0);
      setTimeout(()=>{ window.scrollTo({top:_sy, behavior:'instant'}); }, 50);
    }
  }

  function attachMasterTableEvents(){
    const wrap = document.getElementById('masterTableWrap');
    if(!wrap) return;
    wrap.querySelectorAll('[data-action="edit-product"]').forEach(el=>{
      el.onclick = () => {
        const orig = state.products.find(x=>x.id===el.dataset.id);
        state.editingProduct = JSON.parse(JSON.stringify(orig));
        ensureExtraSections(state.editingProduct);
        state.drawerOpen = true; render();
      };
    });
    wrap.querySelectorAll('[data-action="duplicate-product"]').forEach(el=>{
      el.onclick = () => {
        const orig = state.products.find(x=>x.id===el.dataset.id);
        if(!orig) return;
        const copy = JSON.parse(JSON.stringify(orig));
        copy.id = uid();
        copy.deleted = false;
        copy._kodeAuto = true;
        copy.kode = computeAutoKode(copy.namaProduk, null);
        copy.tanggalIsi = todayISO();
        state.editingProduct = copy;
        ensureExtraSections(state.editingProduct);
        state.drawerOpen = true;
        showToast('Data disalin — cek dulu sebelum klik Simpan Produk.');
        render();
      };
    });
    wrap.querySelectorAll('[data-action="delete-product"]').forEach(el=>{
      el.onclick = async () => {
        if(!confirm('Hapus produk ini? Data tetap tersimpan di Arsip, bukan dihapus permanen.')) return;
        const prod = state.products.find(x=>x.id===el.dataset.id);
        if(prod) prod.deleted = true;
        await saveProducts(); showToast('Produk dipindah ke Arsip.'); render();
      };
    });
    wrap.querySelectorAll('[data-action="restore-product"]').forEach(el=>{
      el.onclick = async () => {
        const prod = state.products.find(x=>x.id===el.dataset.id);
        if(prod) prod.deleted = false;
        await saveProducts(); showToast('Produk dipulihkan ke Data Master.'); render();
      };
    });
    wrap.querySelectorAll('[data-action="purge-product"]').forEach(el=>{
      el.onclick = async () => {
        if(!confirm('Hapus PERMANEN produk ini? Tindakan ini tidak bisa dibatalkan.')) return;
        state.products = state.products.filter(x=>x.id!==el.dataset.id);
        await saveProducts(); showToast('Produk dihapus permanen.'); render();
      };
    });
  }

  /* ---- Export Jadwal Kalibrasi ke Excel (format sama seperti REPORT JADWAL KALIBRASI) ---- */
  async function exportKalibrasiExcel(){
    if(typeof XLSX === 'undefined'){ showToast('Gagal memuat pustaka Excel. Periksa koneksi internet.'); return; }
    const active = (state.jadwalKalibrasi||[]).filter(k=>!k.deleted);
    const aoa = [];
    aoa.push(['REPORT JADWAL KALIBRASI']);
    aoa.push([]);
    aoa.push(['NO.','KODE ITEM','NAMA ALAT','MERK','TIPE','SERIAL NO.','SKALA/RESOLUSI','LOKASI','CAL DATE','DUE DATE','FREKUENSI','HASIL']);

    KALIBRASI_DEPTS.forEach(dept=>{
      const deptItems = active.filter(k=>k.departemen===dept.code);
      if(deptItems.length===0) return;
      aoa.push(['KALIBRASI INTERNAL']);
      aoa.push([dept.label]);
      const byItem = {};
      const itemOrder = [];
      deptItems.forEach(k=>{
        const key = k.item || '(Tanpa Kategori)';
        if(!byItem[key]){ byItem[key] = []; itemOrder.push(key); }
        byItem[key].push(k);
      });
      itemOrder.forEach(itemName=>{
        aoa.push(['ITEM : ' + itemName]);
        byItem[itemName].forEach((k,i)=>{
          aoa.push([i+1, k.kodeItem, k.namaAlat, k.merk, k.tipe, k.serialNo, k.skalaResolusi, k.lokasi, formatDateID(k.calDate), formatDateID(k.dueDate), k.frekuensi, k.hasil]);
        });
      });
      aoa.push([]);
    });

    const ws = XLSX.utils.aoa_to_sheet(aoa);
    ws['!cols'] = [{wch:5},{wch:12},{wch:22},{wch:12},{wch:10},{wch:14},{wch:26},{wch:12},{wch:12},{wch:12},{wch:14},{wch:16}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'MASTER');
    XLSX.writeFile(wb, 'Report Jadwal Kalibrasi.xlsx');
  }
